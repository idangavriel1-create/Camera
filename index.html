<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Camera Panel</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#1f1f1f,#3c3c3c);
    color: white;
    text-align: center;
}

#camera-container {
    width: 700px;
    height: 500px;
    margin: auto;
    overflow: hidden;
    border-radius: 16px;
    position: relative;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    transform-origin: center;
    cursor: grab;
}

#controls {
    width: 700px;
    margin: 15px auto;
}

input {
    width: 100%;
}

button {
    margin-top: 10px;
    padding: 10px;
}
</style>
</head>

<body>

<h2>🎥 Pro Camera Panel</h2>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
</div>

<div id="controls">
    <label>Zoom <span id="zoomVal"></span></label>
    <input id="zoom" type="range" min="1" max="3" step="0.05" value="1">

    <label id="brightnessWrap">Brightness <span id="bVal"></span></label>
    <input id="brightness" type="range" min="0" max="1" step="0.05" value="0.5">

    <label id="contrastWrap">Contrast <span id="cVal"></span></label>
    <input id="contrast" type="range" min="0" max="2" step="0.05" value="1">

    <button id="start">Start Camera</button>
    <button id="toggle">Auto-Center: OFF</button>
    <button id="reset">Reset</button>
</div>

<script>
let video = document.getElementById("video");
let track;
let capabilities = {};
let autoCenter = false;

let state = {
    zoom: 1,
    brightness: 0.5,
    contrast: 1
};

// debounce
let timeout;
function applyConstraints() {
    clearTimeout(timeout);
    timeout = setTimeout(async () => {
        if (!track) return;
        try {
            await track.applyConstraints({advanced:[state]});
        } catch(e) {}
    }, 50);
}

// start camera
document.getElementById("start").onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject = stream;
    track = stream.getVideoTracks()[0];
    capabilities = track.getCapabilities();

    // hide unsupported
    if (!capabilities.brightness) document.getElementById("brightnessWrap").style.display="none";
    if (!capabilities.contrast) document.getElementById("contrastWrap").style.display="none";
};

// sliders
zoom.oninput = e => {
    state.zoom = +e.target.value;
    zoomVal.innerText = state.zoom.toFixed(2);
    applyConstraints();
    updateTransform();
};

brightness.oninput = e => {
    state.brightness = +e.target.value;
    bVal.innerText = state.brightness;
    applyConstraints();
};

contrast.oninput = e => {
    state.contrast = +e.target.value;
    cVal.innerText = state.contrast;
    applyConstraints();
};

// reset
reset.onclick = () => {
    state = {zoom:1, brightness:0.5, contrast:1};
    zoom.value=1; brightness.value=0.5; contrast.value=1;
    applyConstraints();
    updateTransform();
};

// drag
let offsetX=0, offsetY=0, dragging=false, startX, startY;

video.onmousedown = e=>{
    dragging=true;
    startX=e.clientX-offsetX;
    startY=e.clientY-offsetY;
};

window.onmousemove = e=>{
    if(!dragging) return;
    offsetX = e.clientX - startX;
    offsetY = e.clientY - startY;
    updateTransform();
};

window.onmouseup = ()=> dragging=false;

// limit movement
function clamp() {
    let zoom = state.zoom;
    let maxX = (video.offsetWidth*zoom - video.offsetWidth)/2;
    let maxY = (video.offsetHeight*zoom - video.offsetHeight)/2;

    offsetX = Math.max(-maxX, Math.min(maxX, offsetX));
    offsetY = Math.max(-maxY, Math.min(maxY, offsetY));
}

function updateTransform() {
    clamp();
    video.style.transform = `scale(${state.zoom}) translate(${offsetX}px, ${offsetY}px)`;
}

// AUTO CENTER (fallback פשוט עובד תמיד)
setInterval(()=>{
    if(!autoCenter) return;

    // מרכז אוטומטי עדין (ללא FaceDetector)
    offsetX *= 0.9;
    offsetY *= 0.9;

    updateTransform();
}, 30);

// toggle
toggle.onclick = ()=>{
    autoCenter = !autoCenter;
    toggle.innerText = "Auto-Center: " + (autoCenter ? "ON" : "OFF");
};

</script>

</body>
</html>
