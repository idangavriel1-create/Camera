<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Control Panel</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f0f0;
        padding: 20px;
    }

    #camera-container {
        position: relative;
        width: 640px;
        height: 480px;
        overflow: hidden;
        border: 2px solid #333;
        margin-bottom: 10px;
        background: black;
    }

    #video {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: center center;
        cursor: grab;
        user-select: none;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #controls {
        display: flex;
        flex-direction: column;
        width: 640px;
    }

    #controls label {
        margin-bottom: 5px;
    }

    input[type="range"] {
        width: 100%;
    }

    button {
        margin-top: 10px;
        padding: 8px 16px;
        font-size: 16px;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Camera Control Panel</h2>

<div id="camera-container">
    <video id="video" autoplay playsinline></video>
</div>

<div id="controls">
    <label>Zoom: <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1"></label>
    <label>Brightness: <input type="range" id="brightnessSlider" min="0" max="1" step="0.05" value="0.5"></label>
    <label>Contrast: <input type="range" id="contrastSlider" min="0" max="2" step="0.05" value="1"></label>
    <button id="startBtn">Start Camera</button>
</div>

<script>
const CameraController = (() => {
    let videoTrack = null;
    let capabilities = {};
    let settings = {};
    let video = null;

    // Digital pan state
    let offsetX = 0, offsetY = 0;
    let isDragging = false;
    let dragStart = {x: 0, y: 0};

    async function start(videoElementId = "video") {
        try {
            video = document.getElementById(videoElementId);

            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: false});
            video.srcObject = stream;

            videoTrack = stream.getVideoTracks()[0];
            capabilities = videoTrack.getCapabilities();
            settings = videoTrack.getSettings();

            console.log("Camera started", capabilities, settings);

            setupUI();
        } catch (err) {
            console.error("Error starting camera:", err);
            alert("Failed to start camera. Check permissions or HTTPS.");
        }
    }

    async function applyConstraint(name, value) {
        if (!videoTrack) return;
        try {
            await videoTrack.applyConstraints({advanced: [{[name]: value}]});
        } catch(e) {
            console.warn(`Constraint ${name} not supported:`, e);
        }
    }

    function updateTransform(zoom = 1) {
        video.style.transform = `scale(${zoom}) translate(${offsetX}px, ${offsetY}px)`;
    }

    function setupUI() {
        const zoomSlider = document.getElementById("zoomSlider");
        const brightnessSlider = document.getElementById("brightnessSlider");
        const contrastSlider = document.getElementById("contrastSlider");

        // Zoom
        zoomSlider?.addEventListener("input", e => {
            const val = parseFloat(e.target.value);
            if (capabilities.zoom) applyConstraint("zoom", val);
            updateTransform(val);
        });

        // Brightness
        brightnessSlider?.addEventListener("input", e => {
            const val = parseFloat(e.target.value);
            if (capabilities.brightness) applyConstraint("brightness", val);
        });

        // Contrast
        contrastSlider?.addEventListener("input", e => {
            const val = parseFloat(e.target.value);
            if (capabilities.contrast) applyConstraint("contrast", val);
        });

        // Drag for digital pan
        video.addEventListener("mousedown", e => {
            isDragging = true;
            dragStart.x = e.clientX - offsetX;
            dragStart.y = e.clientY - offsetY;
            video.style.cursor = "grabbing";
        });

        window.addEventListener("mousemove", e => {
            if (!isDragging) return;
            offsetX = e.clientX - dragStart.x;
            offsetY = e.clientY - dragStart.y;
            updateTransform(parseFloat(zoomSlider?.value || 1));
        });

        window.addEventListener("mouseup", () => {
            if (isDragging) {
                isDragging = false;
                video.style.cursor = "grab";
            }
        });
    }

    return {start};
})();

// Button to start camera
document.getElementById("startBtn").addEventListener("click", () => {
    CameraController.start();
});
</script>

</body>
</html>
